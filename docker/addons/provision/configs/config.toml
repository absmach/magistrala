[bootstrap]
  [bootstrap.content]
    [bootstrap.content.agent.log]
      level = "info"

    [bootstrap.content.agent.mqtt]
      mtls = false
      qos = 0
      retain = false
      skip_tls_ver = true
      url = "localhost:1883"

    [bootstrap.content.agent.server]
      fluxmq_url = "amqp://guest:guest@localhost:5682/"
      port = "9000"
  
    [bootstrap.content.agent.heartbeat]
      interval = "30s"
  
    [bootstrap.content.agent.terminal]
      session_timeout = "30s"
    

    [bootstrap.content.export.exp]
      log_level = "debug"
      fluxmq = "amqp://guest:guest@localhost:5682/"
      port = "8172"
      cache_url = "localhost:6379"
      cache_pass = ""
      cache_db = "0"

    [bootstrap.content.export.mqtt]
      ca_path = "ca.crt"
      cert_path = "client.crt"
      channel = ""
      host = "tcp://localhost:1883"
      mtls = false
      password = ""
      priv_key_path = "client.key"
      qos = 0
      retain = false
      skip_tls_ver = false
      username = ""

    [[bootstrap.content.export.routes]]
      mqtt_topic = ""
      fluxmq_topic = "#"
      subtopic = ""
      type = "plain"
      workers = 10

[[clients]]
  name = "client"

  [clients.metadata]
    external_id = "xxxxxx"

[[channels]]
  name = "control-channel"

  [channels.metadata]
    type = "control"

[[channels]]
  name = "data-channel"

  [channels.metadata]
    type = "data"
