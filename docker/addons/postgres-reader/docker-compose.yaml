# This docker-compose file contains optional Postgres-reader service for Magistrala platform.
# Since this service is optional, this file is dependent of docker-compose.yaml file
# from <project_root>/docker. In order to run this service, execute command:
# docker compose -f docker/docker-compose.yaml -f docker/addons/postgres-reader/docker-compose.yaml up
# from project root.

networks:
  supermq-base-net:
    external: true

services:
  postgres-reader:
    image: ghcr.io/absmach/magistrala/postgres-reader:${SMQ_RELEASE_TAG}
    container_name: supermq-postgres-reader
    restart: on-failure
    environment:
      SMQ_POSTGRES_READER_LOG_LEVEL: ${SMQ_POSTGRES_READER_LOG_LEVEL}
      SMQ_POSTGRES_READER_HTTP_HOST: ${SMQ_POSTGRES_READER_HTTP_HOST}
      SMQ_POSTGRES_READER_HTTP_PORT: ${SMQ_POSTGRES_READER_HTTP_PORT}
      SMQ_POSTGRES_READER_HTTP_SERVER_CERT: ${SMQ_POSTGRES_READER_HTTP_SERVER_CERT}
      SMQ_POSTGRES_READER_HTTP_SERVER_KEY: ${SMQ_POSTGRES_READER_HTTP_SERVER_KEY}
      SMQ_POSTGRES_HOST: ${SMQ_POSTGRES_HOST}
      SMQ_POSTGRES_PORT: ${SMQ_POSTGRES_PORT}
      SMQ_POSTGRES_USER: ${SMQ_POSTGRES_USER}
      SMQ_POSTGRES_PASS: ${SMQ_POSTGRES_PASS}
      SMQ_POSTGRES_NAME: ${SMQ_POSTGRES_NAME}
      SMQ_POSTGRES_SSL_MODE: ${SMQ_POSTGRES_SSL_MODE}
      SMQ_POSTGRES_SSL_CERT: ${SMQ_POSTGRES_SSL_CERT}
      SMQ_POSTGRES_SSL_KEY: ${SMQ_POSTGRES_SSL_KEY}
      SMQ_POSTGRES_SSL_ROOT_CERT: ${SMQ_POSTGRES_SSL_ROOT_CERT}
      SMQ_CLIENTS_GRPC_URL: ${SMQ_CLIENTS_GRPC_URL}
      SMQ_CLIENTS_GRPC_TIMEOUT: ${SMQ_CLIENTS_GRPC_TIMEOUT}
      SMQ_CLIENTS_GRPC_CLIENT_CERT: ${SMQ_CLIENTS_GRPC_CLIENT_CERT:+/clients-grpc-client.crt}
      SMQ_CLIENTS_GRPC_CLIENT_KEY: ${SMQ_CLIENTS_GRPC_CLIENT_KEY:+/clients-grpc-client.key}
      SMQ_CLIENTS_GRPC_SERVER_CA_CERTS: ${SMQ_CLIENTS_GRPC_SERVER_CA_CERTS:+/clients-grpc-server-ca.crt}
      SMQ_POSTGRES_READER_GRPC_URL: ${SMQ_POSTGRES_READER_GRPC_URL}
      SMQ_POSTGRES_READER_GRPC_PORT: ${SMQ_POSTGRES_READER_GRPC_PORT}
      SMQ_POSTGRES_READER_GRPC_HOST: ${SMQ_POSTGRES_READER_GRPC_HOST}
      SMQ_POSTGRES_READER_GRPC_TIMEOUT: ${SMQ_POSTGRES_READER_GRPC_TIMEOUT}
      SMQ_POSTGRES_READER_GRPC_CLIENT_CERT: ${SMQ_POSTGRES_READER_GRPC_CLIENT_CERT:+./ssl/certs/reader-grpc-client.crt}
      SMQ_POSTGRES_READER_GRPC_CLIENT_CA_CERTS: ${SMQ_POSTGRES_READER_GRPC_CLIENT_CA_CERTS:+./ssl/certs/ca.crt}
      SMQ_POSTGRES_READER_GRPC_SERVER_CA_CERTS: ${SMQ_POSTGRES_READER_GRPC_SERVER_CA_CERTS:+./ssl/certs/ca.crt}
      SMQ_POSTGRES_READER_GRPC_CLIENT_KEY: ${SMQ_POSTGRES_READER_GRPC_CLIENT_KEY:+/readers-grpc-client.key}
      SMQ_POSTGRES_READER_GRPC_SERVER_CERT: ${SMQ_POSTGRES_READER_GRPC_SERVER_CERT:+./ssl/certs/readers-grpc-server.crt}
      SMQ_POSTGRES_READER_GRPC_SERVER_KEY: ${SMQ_POSTGRES_READER_GRPC_SERVER_KEY:+./ssl/certs/readers-grpc-server.key}
      SMQ_AUTH_GRPC_URL: ${SMQ_AUTH_GRPC_URL}
      SMQ_AUTH_GRPC_TIMEOUT: ${SMQ_AUTH_GRPC_TIMEOUT}
      SMQ_AUTH_GRPC_CLIENT_CERT: ${SMQ_AUTH_GRPC_CLIENT_CERT:+/auth-grpc-client.crt}
      SMQ_AUTH_GRPC_CLIENT_KEY: ${SMQ_AUTH_GRPC_CLIENT_KEY:+/auth-grpc-client.key}
      SMQ_AUTH_GRPC_SERVER_CA_CERTS: ${SMQ_AUTH_GRPC_SERVER_CA_CERTS:+/auth-grpc-server-ca.crt}
      SMQ_SEND_TELEMETRY: ${SMQ_SEND_TELEMETRY}
      SMQ_POSTGRES_READER_INSTANCE_ID: ${SMQ_POSTGRES_READER_INSTANCE_ID}
    ports:
      - ${SMQ_POSTGRES_READER_HTTP_PORT}:${SMQ_POSTGRES_READER_HTTP_PORT}
      - ${SMQ_POSTGRES_READER_GRPC_PORT}:${SMQ_POSTGRES_READER_GRPC_PORT}
    networks:
      - supermq-base-net
    volumes:
      - type: bind
        source: ${SMQ_ADDONS_CERTS_PATH_PREFIX}${SMQ_AUTH_GRPC_CLIENT_CERT:-./ssl/certs/dummy/client_cert}
        target: /auth-grpc-client${SMQ_AUTH_GRPC_CLIENT_CERT:+.crt}
        bind:
          create_host_path: true
      - type: bind
        source: ${SMQ_ADDONS_CERTS_PATH_PREFIX}${SMQ_AUTH_GRPC_CLIENT_KEY:-./ssl/certs/dummy/client_key}
        target: /auth-grpc-client${SMQ_AUTH_GRPC_CLIENT_KEY:+.key}
        bind:
          create_host_path: true
      - type: bind
        source: ${SMQ_ADDONS_CERTS_PATH_PREFIX}${SMQ_AUTH_GRPC_SERVER_CA_CERTS:-./ssl/certs/dummy/server_ca}
        target: /auth-grpc-server-ca${SMQ_AUTH_GRPC_SERVER_CA_CERTS:+.crt}
        bind:
          create_host_path: true
      # Clients gRPC mTLS client certificates
      - type: bind
        source: ${SMQ_ADDONS_CERTS_PATH_PREFIX}${SMQ_CLIENTS_GRPC_CLIENT_CERT:-ssl/certs/dummy/client_cert}
        target: /clients-grpc-client${SMQ_CLIENTS_GRPC_CLIENT_CERT:+.crt}
        bind:
          create_host_path: true
      - type: bind
        source: ${SMQ_ADDONS_CERTS_PATH_PREFIX}${SMQ_CLIENTS_GRPC_CLIENT_KEY:-ssl/certs/dummy/client_key}
        target: /clients-grpc-client${SMQ_CLIENTS_GRPC_CLIENT_KEY:+.key}
        bind:
          create_host_path: true
      - type: bind
        source: ${SMQ_ADDONS_CERTS_PATH_PREFIX}${SMQ_CLIENTS_GRPC_SERVER_CA_CERTS:-ssl/certs/dummy/server_ca}
        target: /clients-grpc-server-ca${SMQ_CLIENTS_GRPC_SERVER_CA_CERTS:+.crt}
        bind:
          create_host_path: true
      # Reader gRPC mTLS client certificates
      - type: bind
        source: ${SMQ_POSTGRES_READER_GRPC_SERVER_CERT:-ssl/certs/dummy/server_cert}
        target: /readers-grpc-server${SMQ_POSTGRES_READER_GRPC_SERVER_CERT:+.crt}
        bind:
          create_host_path: true
      - type: bind
        source: ${SMQ_POSTGRES_READER_GRPC_SERVER_KEY:-ssl/certs/dummy/server_key}
        target: /readers-grpc-server${SMQ_POSTGRES_READER_GRPC_SERVER_KEY:+.key}
        bind:
          create_host_path: true
      - type: bind
        source: ${SMQ_POSTGRES_READER_GRPC_SERVER_CA_CERTS:-ssl/certs/dummy/server_ca_certs}
        target: /readers-grpc-server-ca${SMQ_POSTGRES_READER_GRPC_SERVER_CA_CERTS:+.crt}
        bind:
          create_host_path: true
      - type: bind
        source: ${SMQ_POSTGRES_READER_GRPC_CLIENT_CA_CERTS:-ssl/certs/dummy/client_ca_certs}
        target: /readers-grpc-server${SMQ_POSTGRES_READER_GRPC_CLIENT_CA_CERTS:+.crt}
        bind:
          create_host_path: true
      - type: bind
        source: ${SMQ_POSTGRES_READER_GRPC_CLIENT_CERT:-ssl/certs/dummy/client_cert}
        target: /readers-grpc-client${SMQ_POSTGRES_READER_GRPC_CLIENT_CERT:+.crt}
        bind:
          create_host_path: true
      - type: bind
        source: ${SMQ_POSTGRES_READER_GRPC_CLIENT_KEY:-ssl/certs/dummy/client_key}
        target: /readers-grpc-client${SMQ_POSTGRES_READER_GRPC_CLIENT_KEY:+.key}
        bind:
          create_host_path: true
